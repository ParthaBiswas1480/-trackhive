<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackHive — Applications</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">🐝 TrackHive</div>
        <div class="nav-links">
            <a href="/dashboard.html">Dashboard</a>
            <a href="/applications.html">Applications</a>
            <a href="/stats.html">Stats</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>My Applications</h1>
            <button class="btn-primary" onclick="showAddForm()">
                + Add New
            </button>
        </div>

        <!-- Add Application Form -->
        <div id="add-form" class="card hidden">
            <h2>Add New Application</h2>

            <div id="form-error" class="error-msg hidden"></div>

            <div class="form-row">
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="company" placeholder="TCS">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="role" placeholder="Software Developer">
                </div>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea id="notes" placeholder="Any notes..."></textarea>
            </div>

            <div class="form-actions">
                <button class="btn-primary" onclick="addApplication()">
                    Add Application
                </button>
                <button class="btn-secondary" onclick="hideAddForm()">
                    Cancel
                </button>
            </div>
        </div>

        <!-- Applications Table -->
        <div class="card">
            <table class="app-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Applied On</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="applications-tbody">
                    <tr>
                        <td colspan="6">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/js/applications.js"></script>
</body>
</html>

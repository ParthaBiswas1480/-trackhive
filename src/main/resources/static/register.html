<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackHive — Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="logo">🐝 TrackHive</div>
        <p class="tagline">Start tracking your dream job.</p>

        <div id="error-msg" class="error-msg hidden"></div>
        <div id="success-msg" class="success-msg hidden"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Parth Shah">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="parth@gmail.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-primary" onclick="register()">Register</button>

        <p class="switch-link">
            Already have an account? 
            <a href="/index.html">Login</a>
        </p>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
